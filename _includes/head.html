<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">

  <meta property="og:site_name" content="Myo͞o"/>
  <meta property="og:url" content="{{ site.baseurl }}{{ page.url }}"/>
  {% if page.number or page.title == "Home" %}
      <meta property="og:title" content="{{ site.title }}"/>
      <meta property="og:description" content="Just another programming blog"/>
    {% else %}
      <meta property="og:title" content="{{ page.title }} ‒ {{ site.title }}"/>
      <meta property="og:description" content="{{ page.content | strip_html | truncatewords: 10 }}"/>
  {% endif %}
  <meta property="og:image" content="{{ site.baseurl }}/public/images/logo.png"/>

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

  <title>
    {% if page.title == "Home" %}
      {{ site.title }}
    {% else %}
      {{ page.title }} ‒ {{ site.title }}
    {% endif %}
  </title>

  <!-- CSS -->
  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/public/css/poole.css">
  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/public/css/syntax.css">
  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/public/css/lanyon.css">
  <link rel="stylesheet" href="http://fonts.googleapis.com/css?family=PT+Serif:400,400italic,700%7CPT+Sans:400">

  <!-- Icons -->
  <link rel="apple-touch-icon-precomposed" sizes="144x144" href="{{ site.baseurl }}/public/images/favicon.png">
  <link rel="shortcut icon" href="{{ site.baseurl }}/public/images/favicon.png">
</head>
